<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Tennisverein Sitzendorf_cut.png">
    <title>Tennisverein Sitzendorf – Bald verfügbar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>
    
    <div class="tennis-line line-1"></div>
    <div class="tennis-line line-2"></div>
    <div class="tennis-line line-3"></div>
    
    <main class="container">
        <div class="logo-mark">
            <img src="Tennisverein Sitzendorf_cut.png" alt="Tennisverein Sitzendorf Logo" class="club-logo">
        </div>
        
        <h1>Tennisverein Sitzendorf</h1>
        
        <div class="loading-section">
            <div class="loading-bar">
                <span class="loading-text">Loading</span>
                <div class="loading-bar-fill"></div>
            </div>
        </div>
        
        <p class="coming-soon">
            <span>An dieser Stelle entsteht unsere neue Website.</span>
            <span>Besuche uns bald wieder!</span>
        </p>
        
        <div class="divider">
            <span></span>
            <span class="ball-icon">●</span>
            <span></span>
        </div>
        
        <footer>
            <p>© Tennisverein Sitzendorf</p>
        </footer>
    </main>
    
    <div class="floating-elements">
        <span class="float-ball ball-1">●</span>
        <span class="float-ball ball-2">●</span>
        <span class="float-ball ball-3">●</span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
